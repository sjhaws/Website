<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nephi Journey</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --panel: rgba(18, 24, 30, 0.92);
        --panel-border: #51606d;
        --text: #f5e9d2;
        --accent: #f2c14e;
        --accent-2: #5ad1a5;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #2b3646 0%, #16202b 42%, #0f1218 100%);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }

      .ui-button {
        border: 2px solid var(--panel-border);
        background: linear-gradient(180deg, #334250, #202833);
        color: var(--text);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0.9rem 1.2rem;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }

      .ui-button:hover {
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.js"></script>
    <script src="./game.js"></script>
  </body>
  </html>
